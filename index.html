<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPDA Generator — HsGreen</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- PDF.js para renderizar PDFs adjuntos como imágenes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configurar el worker de PDF.js
        window.pdfjsLib = window['pdfjs-dist/build/pdf'];
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#f0fdf4',
                100: '#dcfce7',
                200: '#bbf7d0',
                300: '#86efac',
                400: '#4ade80',
                500: '#22c55e',
                600: '#16a34a',
                700: '#15803d',
                800: '#166534',
                900: '#14532d',
              }
            }
          }
        }
      }
    </script>
    <style>
      /* ESTILOS ELEGANTES PARA SELECTS (GLOBAL) */
      select {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        background-color: white; /* Color base, sobreescribible con clases Tailwind bg-* */
        /* Flecha SVG gris pizarra suave */
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%2394a3b8'%3e%3cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 9l6 6 6-6'%3e%3c/path%3e%3c/svg%3e");
        background-position: right 0.5rem center;
        background-repeat: no-repeat;
        background-size: 1.25em 1.25em;
        padding-right: 2rem !important; /* Espacio para la flecha */
      }

      select:focus {
        outline: none;
      }

      /* Fix para IE */
      select::-ms-expand {
        display: none;
      }

      /* --- CLASES DE UTILIDAD PARA PDF E IMPRESIÓN --- */

      /* 1. REGLA DE ORO PARA TÍTULOS: Nunca solos al final */
      h1, h2, h3, h4, h5, h6, .header-title {
        /* Eliminado page-break-after: avoid porque causa solapamiento en html2pdf */
      }

      /* 2. REGLA PARA BLOQUES INDIVISIBLES (Objetivos, Cards) */
      .avoid-page-break {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        display: block; /* Importante para que el break-inside funcione correctamente */
      }

      /* 3. REGLA PARA TABLAS */
      table {
        page-break-inside: auto; /* La tabla puede romperse si es muy larga... */
        width: 100%;
      }
      
      /* ...pero las filas NUNCA se rompen por la mitad */
      tr, td, th {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }
      
      thead {
        display: table-header-group;
      }

      /* GESTIÓN GENERAL DE IMPRESIÓN */
      @page {
        size: A4 portrait;
        /* Márgenes reales por página — el navegador gestiona el espacio en cada hoja.
           Recuerda desmarcar "Encabezados y pies" en el diálogo de impresión. */
        margin: 15mm 14mm 15mm 14mm;
      }

      @media print {
        /* Ocultar TODO por defecto */
        body * {
          visibility: hidden;
        }

        /* Reseteos críticos de layout */
        html, body, #root {
          height: auto !important;
          overflow: visible !important;
          background: white !important;
          margin: 0 !important;
          padding: 0 !important;
          width: 100% !important;
          position: static !important;
        }

        /* Mostrar SOLO el reporte */
        #printable-report, #printable-report * {
          visibility: visible;
        }

        /* Posicionar el reporte dentro del área @page */
        #printable-report {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          margin: 0 !important;
          padding: 0 !important;
          box-shadow: none !important;
        }

        .no-print {
          display: none !important;
        }

        /* OPTIMIZACIÓN DE TEXTO */
        #printable-report * {
          letter-spacing: 0.2px !important;
          font-variant-ligatures: none !important;
          text-rendering: geometricPrecision !important;
          -webkit-font-smoothing: antialiased !important;
        }

        /* ASEGURAR COLORES DE FONDO */
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* CAPÍTULOS Y ANEXOS: siempre en página nueva */
        .print-page-break {
          page-break-before: always !important;
          break-before: page !important;
        }

        /* BLOQUES INDIVISIBLES (se mantienen juntos) */
        .avoid-page-break {
          page-break-inside: avoid !important;
          break-inside: avoid !important;
        }

        /* CABECERAS: no solas al final de página */
        h1, h2, h3, h4, h5, h6 {
          page-break-after: avoid !important;
          break-after: avoid !important;
          page-break-inside: avoid !important;
          break-inside: avoid !important;
        }

        p {
          orphans: 3;
          widows: 3;
        }

        /* TABLAS: permitir que se repartan entre páginas, pero sin partir filas */
        table {
          page-break-inside: auto !important;
          break-inside: auto !important;
          border-collapse: collapse !important;
        }

        tbody {
          page-break-inside: auto !important;
          break-inside: auto !important;
        }

        tr, td, th {
          page-break-inside: avoid !important;
          break-inside: avoid !important;
          page-break-after: auto !important;
        }

        thead {
          display: table-header-group !important;
        }

        tfoot {
          display: table-footer-group !important;
        }

        /* CRÍTICO: overflow-hidden/overflow-x-auto bloquea los saltos de página.
           Forzamos overflow visible en todos los wrappers durante la impresión. */
        #printable-report .overflow-hidden,
        #printable-report .overflow-x-auto,
        #printable-report .overflow-y-auto,
        #printable-report .overflow-auto {
          overflow: visible !important;
        }

        /* Imágenes que no deben cortarse */
        img, svg {
          page-break-inside: avoid !important;
          break-inside: avoid !important;
          max-width: 100% !important;
        }
      }

      /* GESTIÓN DE SALTOS DE PÁGINA EXPLÍCITOS (Funciona tanto en print como html2pdf) */
      .page-break {
        page-break-before: always !important;
        break-before: page !important;
        display: block !important;
        height: 1px !important; /* Altura mínima para que html2canvas lo detecte */
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        visibility: visible !important; /* Debe ser visible para el renderizador */
        clear: both !important;
        background: transparent !important;
        border: none !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-50 text-gray-900 antialiased">
    <div id="root"></div>

</body>
</html>
